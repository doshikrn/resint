services:
  db:
    image: postgres:16
    container_name: inventory_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      APP_DB_USER: ${APP_DB_USER:?APP_DB_USER is required}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventory} -d ${POSTGRES_DB:-inventory}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${APP_DB_USER:?APP_DB_USER is required}:${APP_DB_PASSWORD:?APP_DB_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ALG: ${JWT_ALG:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:?CORS_ALLOW_ORIGINS is required}
      EXPOSE_STACKTRACE: ${EXPOSE_STACKTRACE:-false}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_RETENTION_REVISION_DAYS: ${BACKUP_RETENTION_REVISION_DAYS:-90}
      BACKUP_RETENTION_EMERGENCY_DAYS: ${BACKUP_RETENTION_EMERGENCY_DAYS:-14}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-backups/}
      BACKUP_S3_ENDPOINT_URL: ${BACKUP_S3_ENDPOINT_URL:-}
      BACKUP_S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY:-}
      BACKUP_S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-us-east-1}
    volumes:
      - pgbackups:/backups
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_ENV: production
        NEXT_PUBLIC_KITCHEN_WAREHOUSE_ID: ${NEXT_PUBLIC_KITCHEN_WAREHOUSE_ID:-}
        NEXT_PUBLIC_BAR_WAREHOUSE_ID: ${NEXT_PUBLIC_BAR_WAREHOUSE_ID:-}
        NEXT_PUBLIC_BRAND_NAME: ${NEXT_PUBLIC_BRAND_NAME:-Resident Restaurant}
    container_name: inventory_frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:8000
    expose:
      - "3000"

  proxy:
    image: nginx:1.27-alpine
    container_name: inventory_proxy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro

  backup:
    image: postgres:16
    container_name: inventory_backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_RETENTION_REVISION_DAYS: ${BACKUP_RETENTION_REVISION_DAYS:-90}
      BACKUP_RETENTION_EMERGENCY_DAYS: ${BACKUP_RETENTION_EMERGENCY_DAYS:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - pgbackups:/backups
      - ./docker/backup.sh:/scripts/backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command: |
      while true; do
        /bin/sh /scripts/backup.sh
        sleep "$${BACKUP_INTERVAL_SECONDS:-86400}"
      done

  restore_check:
    image: postgres:16
    container_name: inventory_restore_check
    profiles: ["ops"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      BACKUP_DIR: /backups
    volumes:
      - pgbackups:/backups:ro
      - ./docker/restore_check.sh:/scripts/restore_check.sh:ro
      - ./docker/restore_backup.sh:/scripts/restore_backup.sh:ro
    entrypoint: ["/bin/sh", "/scripts/restore_check.sh"]

volumes:
  pgdata:
  pgbackups:
