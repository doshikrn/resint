name: Migration Safety Guard

on:
  pull_request:
    paths:
      - 'backend/alembic/**'
      - 'backend/scripts/check_migration_safety.py'
      - 'backend/docker/entrypoint.sh'
      - '.github/workflows/migration-guard.yml'
  push:
    branches: [main]
    paths:
      - 'backend/alembic/**'
      - 'backend/scripts/check_migration_safety.py'
      - 'backend/docker/entrypoint.sh'
      - '.github/workflows/migration-guard.yml'

jobs:
  migration-safety:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      MIGRATION_GUARD_ENABLED: '1'
      MIGRATION_BACKUP_CONFIRMED: '0'
      MIGRATION_RESTORE_CHECK_CONFIRMED: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run migration safety guard
        run: python scripts/check_migration_safety.py
